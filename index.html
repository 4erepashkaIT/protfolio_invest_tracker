<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06080f">
<title>PTX — Трекер портфеля</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #06080f;
  --bg1:     #0c1018;
  --bg2:     #111720;
  --bg3:     #182030;
  --border:  #1c2a3a;
  --border2: #243347;
  --text:    #c5d4e5;
  --text2:   #7a96b0;
  --text3:   #3e5670;
  --accent:  #00d4c0;
  --acc-bg:  rgba(0,212,192,.09);
  --acc-br:  rgba(0,212,192,.22);
  --gain:    #00c47a;
  --gain-bg: rgba(0,196,122,.09);
  --loss:    #ff3d5c;
  --loss-bg: rgba(255,61,92,.09);
  --crypto:  #f59e0b;
  --stock:   #7b86f5;
  --cash:    #a78bfa;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Sora', -apple-system, sans-serif;
  --r:   12px;
  --r-s:  8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;min-height:-webkit-fill-available;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ─── LAYOUT ─── */
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
@media(min-width:800px){.app{max-width:860px}}

/* ─── HEADER ─── */
.hdr{padding:18px 18px 0;background:var(--bg);position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent);letter-spacing:.06em}
.logo span{color:var(--text3)}
.hdr-acts{display:flex;gap:7px}
.icon-btn{width:34px;height:34px;border-radius:var(--r-s);border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .18s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}

.pf-sum{text-align:center;padding-bottom:20px}
.pf-lbl{font-size:10px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px}
.pf-val{font-family:var(--mono);font-size:34px;font-weight:600;color:var(--text);margin-bottom:8px;letter-spacing:-.02em}
.pf-pnl{display:inline-flex;align-items:center;gap:5px;padding:4px 13px;border-radius:20px;font-family:var(--mono);font-size:12px;font-weight:500}
.pf-pnl.gain{background:var(--gain-bg);color:var(--gain)}
.pf-pnl.loss{background:var(--loss-bg);color:var(--loss)}
.pf-pnl.neu{background:var(--bg2);color:var(--text2)}
.status{display:flex;gap:5px;align-items:center;justify-content:center;margin-top:7px;font-size:10px;color:var(--text3)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--text3)}
.dot.live{background:var(--gain);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── TABS ─── */
.tabs{display:flex;padding:0 18px;gap:2px;border-bottom:1px solid var(--border);background:var(--bg)}
.tab{padding:9px 11px;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ─── CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:18px 18px calc(110px + env(safe-area-inset-bottom))}

/* ─── CARDS ─── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:11px}
.card-ttl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}

/* ─── STATS ─── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-s);padding:12px}
.sc-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.sc-val{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text)}
.sc-val.gain{color:var(--gain)}
.sc-val.loss{color:var(--loss)}

/* ─── CHART ─── */
.chart-wrap{position:relative;height:190px;margin:6px 0}

/* ─── ALLOC BAR ─── */
.alloc-bar{height:7px;border-radius:4px;overflow:hidden;display:flex;margin:11px 0}
.alloc-seg{height:100%;transition:width .5s}
.alloc-leg{display:flex;flex-wrap:wrap;gap:9px}
.al-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.al-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ─── ASSETS ─── */
.asset-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
.asset-row:last-child{border-bottom:none}
.asset-row:hover{background:var(--bg2);margin:0 -14px;padding:11px 14px}
.ai{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-right:11px;flex-shrink:0;font-family:var(--mono)}
.ai.crypto{background:rgba(245,158,11,.11);color:var(--crypto)}
.ai.stock{background:rgba(123,134,245,.11);color:var(--stock)}
.ai.cash{background:rgba(167,139,250,.11);color:var(--cash)}
.ai-info{flex:1;min-width:0}
.ai-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-sub{font-family:var(--mono);font-size:10px;color:var(--text3)}
.ai-r{text-align:right}
.ai-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.ai-pnl{font-family:var(--mono);font-size:10px}
.ai-pnl.gain{color:var(--gain)}
.ai-pnl.loss{color:var(--loss)}
.ai-pnl.neu{color:var(--text3)}

/* ─── TRANSACTIONS ─── */
.tx-date-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:15px 0 7px}
.tx-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-badge{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;margin-right:9px;flex-shrink:0}
.tx-badge.buy{background:var(--gain-bg)}
.tx-badge.sell{background:var(--loss-bg)}
.tx-info{flex:1}
.tx-nm{font-size:13px;font-weight:600;margin-bottom:1px}
.tx-dt{font-size:10px;color:var(--text3);font-family:var(--mono)}
.tx-amt{text-align:right}
.tx-v{font-family:var(--mono);font-size:12px;font-weight:600}
.tx-q{font-family:var(--mono);font-size:10px;color:var(--text3)}
.tx-del{margin-left:9px;color:var(--text3);background:none;border:none;cursor:pointer;font-size:15px;padding:4px;border-radius:4px;transition:color .12s}
.tx-del:hover{color:var(--loss)}

/* ─── ANALYTICS ─── */
.ana-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-s);padding:13px}
.mc-lbl{font-size:10px;color:var(--text3);margin-bottom:5px}
.mc-val{font-family:var(--mono);font-size:17px;font-weight:600}
.mc-val.gain{color:var(--gain)}
.mc-val.loss{color:var(--loss)}
.mc-val.acc{color:var(--accent)}
.mc-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}

/* ─── FAB ─── */
.fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:54px;height:54px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(0,212,192,.38);z-index:100;transition:transform .18s,box-shadow .18s;font-weight:300}
.fab:hover{transform:translateX(-50%) scale(1.06);box-shadow:0 6px 30px rgba(0,212,192,.5)}
.fab:active{transform:translateX(-50%) scale(.95)}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(6,8,15,.88);backdrop-filter:blur(5px);z-index:200;display:none;align-items:flex-end;opacity:0;transition:opacity .22s}
.overlay.open{opacity:1}
@media(min-width:600px){.overlay{align-items:center;justify-content:center}}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:22px 18px calc(22px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.overlay.open .modal{transform:translateY(0)}
@media(min-width:600px){.modal{max-width:460px;border-radius:var(--r);transform:scale(.92) translateY(0);opacity:0;transition:transform .22s,opacity .22s;max-height:90vh}}
@media(min-width:600px){.overlay.open .modal{transform:scale(1);opacity:1}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-ttl{font-size:17px;font-weight:700}
.mc-close{background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .14s}
.mc-close:hover{border-color:var(--loss);color:var(--loss)}

/* ─── FORM ─── */
.fg{margin-bottom:14px}
.flbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:7px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.tg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.tb{padding:10px 8px;border-radius:var(--r-s);border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .14s;text-align:center}
.tb:hover{border-color:var(--border2);color:var(--text)}
.tb.on-buy{background:var(--gain-bg);border-color:var(--gain);color:var(--gain)}
.tb.on-sell{background:var(--loss-bg);border-color:var(--loss);color:var(--loss)}
.tb.on-crypto{background:rgba(245,158,11,.09);border-color:var(--crypto);color:var(--crypto)}
.tb.on-stock{background:rgba(123,134,245,.09);border-color:var(--stock);color:var(--stock)}
.tb.on-cash{background:rgba(167,139,250,.09);border-color:var(--cash);color:var(--cash)}
.fi,.fs{width:100%;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-s);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .14s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--text3)}
.fs option{background:var(--bg2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ftotal{background:var(--bg2);border:1px solid var(--acc-br);border-radius:var(--r-s);padding:11px 13px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.ft-lbl{font-size:11px;color:var(--text3)}
.ft-val{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent)}
.btn-p{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:var(--r-s);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .14s}
.btn-p:hover{opacity:.88}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:56px 20px}
.empty-ico{font-size:44px;margin-bottom:11px}
.empty-ttl{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-txt{font-size:12px;color:var(--text3)}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-s);padding:9px 15px;font-size:12px;color:var(--text);opacity:0;transition:all .25s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── SPINNER ─── */
.spin{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .65s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">PTX<span>//</span></div>
      <div class="hdr-acts">
        <button class="icon-btn" id="refreshBtn" onclick="doRefresh()" title="Обновить цены">↻</button>
        <button class="icon-btn" onclick="doExport()" title="Экспорт CSV">↓</button>
      </div>
    </div>
    <div class="pf-sum">
      <div class="pf-lbl">Стоимость портфеля</div>
      <div class="pf-val" id="hdrVal">—</div>
      <div class="pf-pnl neu" id="hdrPnl">загрузка...</div>
      <div class="status"><div class="dot" id="sDot"></div><span id="sTxt">инициализация</span></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" data-tab="pf"   onclick="switchTab('pf')">Портфель</button>
    <button class="tab"    data-tab="ast"  onclick="switchTab('ast')">Активы</button>
    <button class="tab"    data-tab="tx"   onclick="switchTab('tx')">Сделки</button>
    <button class="tab"    data-tab="ana"  onclick="switchTab('ana')">Аналитика</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-hdr">
      <div class="modal-ttl">Новая сделка</div>
      <button class="mc-close" onclick="closeModal()">×</button>
    </div>
    <form id="txForm" onsubmit="submitTx(event)">

      <div class="fg">
        <label class="flbl">Операция</label>
        <div class="tg">
          <button type="button" class="tb on-buy" id="btn-buy"  onclick="selOp('buy')">📈 Купить</button>
          <button type="button" class="tb"         id="btn-sell" onclick="selOp('sell')">📉 Продать</button>
        </div>
      </div>

      <div class="fg">
        <label class="flbl">Тип актива</label>
        <div class="tg3">
          <button type="button" class="tb on-crypto" id="btn-crypto"  onclick="selType('crypto')">₿ Крипта</button>
          <button type="button" class="tb"            id="btn-stock"  onclick="selType('stock')">📊 Акция</button>
          <button type="button" class="tb"            id="btn-cash"   onclick="selType('cash')">💵 Валюта</button>
        </div>
      </div>

      <div class="fg">
        <label class="flbl" id="assetLbl">Криптовалюта</label>
        <select class="fs" id="cryptoSel" onchange="onCryptoPick()"></select>
        <input  class="fi" id="stockIn"   type="text" placeholder="Тикер: AAPL, SBER.ME, NVDA…" style="display:none" oninput="onStockType()" autocomplete="off" autocorrect="off" autocapitalize="characters">
        <select class="fs" id="cashSel"   style="display:none" onchange="onCashPick()"></select>
      </div>

      <div class="fg">
        <label class="flbl">Дата</label>
        <input class="fi" type="date" id="txDate">
      </div>

      <div class="frow">
        <div class="fg">
          <label class="flbl">Количество</label>
          <input class="fi" type="number" id="txQty" placeholder="0.00" step="any" min="0" oninput="calcTotal()">
        </div>
        <div class="fg">
          <label class="flbl" id="priceLbl">Цена (USD)</label>
          <input class="fi" type="number" id="txPrice" placeholder="0.00" step="any" min="0" oninput="calcTotal()">
        </div>
      </div>

      <div class="ftotal">
        <span class="ft-lbl">Итого (USD)</span>
        <span class="ft-val" id="txTotal">0.00</span>
      </div>

      <button type="submit" class="btn-p">Добавить сделку</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════
const CRYPTOS = [
  {id:'bitcoin',      sym:'BTC',  name:'Bitcoin'},
  {id:'ethereum',     sym:'ETH',  name:'Ethereum'},
  {id:'tether',       sym:'USDT', name:'Tether'},
  {id:'solana',       sym:'SOL',  name:'Solana'},
  {id:'binancecoin',  sym:'BNB',  name:'BNB'},
  {id:'ripple',       sym:'XRP',  name:'XRP'},
  {id:'the-open-network', sym:'TON', name:'Toncoin'},
  {id:'dogecoin',     sym:'DOGE', name:'Dogecoin'},
  {id:'cardano',      sym:'ADA',  name:'Cardano'},
  {id:'avalanche-2',  sym:'AVAX', name:'Avalanche'},
  {id:'polkadot',     sym:'DOT',  name:'Polkadot'},
  {id:'chainlink',    sym:'LINK', name:'Chainlink'},
  {id:'uniswap',      sym:'UNI',  name:'Uniswap'},
  {id:'litecoin',     sym:'LTC',  name:'Litecoin'},
  {id:'shiba-inu',    sym:'SHIB', name:'Shiba Inu'},
  {id:'pepe',         sym:'PEPE', name:'Pepe'},
  {id:'sui',          sym:'SUI',  name:'Sui'},
  {id:'tron',         sym:'TRX',  name:'TRON'},
  {id:'stellar',      sym:'XLM',  name:'Stellar'},
  {id:'not',          sym:'NOT',  name:'Notcoin'},
];

const CASHES = [
  {sym:'USD', name:'Доллар США'},
  {sym:'EUR', name:'Евро'},
  {sym:'CNY', name:'Китайский юань'},
  {sym:'GBP', name:'Фунт стерлингов'},
  {sym:'AED', name:'Дирхам ОАЭ'},
  {sym:'TRY', name:'Турецкая лира'},
  {sym:'KZT', name:'Тенге'},
  {sym:'BYN', name:'Белорусский рубль'},
];

const COLORS = ['#00d4c0','#f59e0b','#7b86f5','#f87171','#4ade80','#c084fc','#fb923c','#38bdf8','#a3e635','#e879f9','#facc15','#2dd4bf'];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const S = {
  txs:    [],          // transactions
  prices: {},          // {SYM: {usd, ch24, ts}}
  usdRub: null,
  tab:    'pf',
  form: {op:'buy', type:'crypto', sym:'', name:'', geckoId:''},
};
const charts = {};

// ════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════
function load() {
  try {
    const t = localStorage.getItem('ptx_tx');    if (t) S.txs    = JSON.parse(t);
    const p = localStorage.getItem('ptx_prices');if (p) S.prices = JSON.parse(p);
    const r = localStorage.getItem('ptx_usdRub');if (r) S.usdRub = +r;
  } catch(e){}
}
function saveTx()     { localStorage.setItem('ptx_tx', JSON.stringify(S.txs)); }
function savePrices() {
  localStorage.setItem('ptx_prices', JSON.stringify(S.prices));
  if (S.usdRub) localStorage.setItem('ptx_usdRub', S.usdRub);
}

// ════════════════════════════════════════════
//  PRICE FETCHING
// ════════════════════════════════════════════
function ftch(url, ms=9000) {
  const c = new AbortController();
  const t = setTimeout(()=>c.abort(), ms);
  return fetch(url, {signal:c.signal}).finally(()=>clearTimeout(t));
}

let busy = false;
async function doRefresh() {
  if (busy) return;
  busy = true;
  setStatus('…','Обновление...');
  document.getElementById('refreshBtn').innerHTML = '<div class="spin"></div>';
  try {
    await Promise.allSettled([fetchCrypto(), fetchStocks(), fetchRates()]);
    savePrices();
    setStatus('live','Актуально');
    render();
    toast('Цены обновлены ✓');
  } catch(e){ setStatus('','Ошибка'); }
  document.getElementById('refreshBtn').innerHTML = '↻';
  busy = false;
}

async function fetchCrypto() {
  const ids = [...new Set(S.txs.filter(t=>t.type==='crypto').map(t=>t.geckoId).filter(Boolean))];
  if (!ids.length) return;
  const r = await ftch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_24hr_change=true`);
  const d = await r.json();
  for (const [id, v] of Object.entries(d)) {
    const coin = CRYPTOS.find(c=>c.id===id);
    const sym  = coin ? coin.sym : id.toUpperCase();
    S.prices[sym] = {usd: v.usd, ch24: v.usd_24h_change||0, ts: Date.now()};
  }
}

async function fetchStocks() {
  const syms = [...new Set(S.txs.filter(t=>t.type==='stock').map(t=>t.sym))];
  for (const s of syms) {
    try {
      const r = await ftch(`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=1d`);
      const d = await r.json();
      const meta = d?.chart?.result?.[0]?.meta;
      if (meta?.regularMarketPrice) {
        const prev = meta.previousClose||meta.regularMarketPrice;
        S.prices[s] = {usd: meta.regularMarketPrice, ch24: ((meta.regularMarketPrice-prev)/prev)*100, ts: Date.now()};
      }
    } catch {
      if (!S.prices[s]) S.prices[s] = {usd:null, ch24:0, ts:0};
    }
  }
}

async function fetchRates() {
  const r = await ftch('https://api.exchangerate-api.com/v4/latest/USD');
  const d = await r.json();
  S.usdRub = d.rates.RUB;
  // Currency prices as USD equivalent of 1 unit
  const syms = [...new Set(S.txs.filter(t=>t.type==='cash').map(t=>t.sym))];
  for (const sym of syms) {
    const rate = d.rates[sym];
    if (rate) S.prices[sym] = {usd: 1/rate, ch24:0, ts: Date.now()};
  }
}

function setStatus(mode, txt) {

// ════════════════════════════════════════════
//  CALCULATIONS
// ════════════════════════════════════════════
function calcHoldings() {
  const sorted = [...S.txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const map = {};
  for (const tx of sorted) {
    if (!map[tx.sym]) map[tx.sym] = {sym:tx.sym, name:tx.name, type:tx.type, geckoId:tx.geckoId||null, qty:0, costUsd:0};
    const h = map[tx.sym];
    if (tx.op==='buy')  { h.qty+=tx.qty; h.costUsd+=tx.qty*tx.priceUsd; }
    else {
      const avg = h.qty>0 ? h.costUsd/h.qty : 0;
      h.qty    -= tx.qty;
      h.costUsd -= avg*tx.qty;
      if (h.qty<1e-9){ h.qty=0; h.costUsd=0; }
    }
  }
  const rub = S.usdRub || 90;
  return Object.values(map)
    .filter(h=>h.qty>1e-9)
    .map(h=>{
      const pi  = S.prices[h.sym];
      const cup = pi?.usd ?? null;
      const cvu = cup!==null ? h.qty*cup : null;
      const pnlU= cvu!==null ? cvu-h.costUsd : null;
      const pct = h.costUsd>0 && pnlU!==null ? (pnlU/h.costUsd)*100 : null;
      return {...h, avgUsd: h.qty>0?h.costUsd/h.qty:0, cup, cvu, cvR: cvu!==null?cvu*rub:null,
        costR: h.costUsd*rub, pnlU, pnlR: pnlU!==null?pnlU*rub:null, pct, ch24: pi?.ch24||0};
    })
    .sort((a,b)=>(b.cvu??0)-(a.cvu??0));
}

function calcStats(hs) {
  const rub = S.usdRub||90;
  let valU=0, costU=0;
  for (const h of hs){ if (h.cvu!==null) valU+=h.cvu; costU+=h.costUsd; }
  const pnlU = valU-costU;
  const pct  = costU>0 ? (pnlU/costU)*100 : 0;
  return {valR:valU*rub, valU, costR:costU*rub, pnlR:pnlU*rub, pnlU, pct, rub};
}

// ════════════════════════════════════════════
const R = new Intl.NumberFormat('ru-RU',{style:'currency',currency:'RUB',maximumFractionDigits:0});
const fR = n => n==null?'—':R.format(n);
const fU = (n,d=2) => n==null?'—':'$'+(+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fP = n => n==null?'—':(n>=0?'+':'')+n.toFixed(2)+'%';
const fQ = (n,s) => { if(n==null)return'—'; const d=n<0.01?6:n<1?4:2; return n.toFixed(d)+' '+s; };
const cls = n => n==null?'neu':n>0?'gain':n<0?'loss':'neu';
const fDate = s => { const d=new Date(s); return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'}); };

function switchTab(tab) {

  render();
}

//  RENDER
// ════════════════════════════════════════════
function render() {
  const hs    = calcHoldings();
  const stats = calcStats(hs);
  renderHeader(stats);

  const el = document.getElementById('content');
  if      (S.tab==='pf')  el.innerHTML = renderPf(hs, stats);
  else if (S.tab==='ast') el.innerHTML = renderAst(hs);
  else if (S.tab==='tx')  el.innerHTML = renderTx();
  else if (S.tab==='ana') el.innerHTML = renderAna(hs, stats);

  setTimeout(()=>{
    if (S.tab==='pf')  drawPfCharts(hs);
    if (S.tab==='ana') drawAnaCharts(hs, stats);
  }, 0);
}

function renderHeader(st) {
  document.getElementById('hdrVal').textContent = fR(st.valR);
  const el = document.getElementById('hdrPnl');
  const c  = cls(st.pnlR);
  el.className = 'pf-pnl ' + c;
  el.textContent = (st.pct>=0?'▲ +':'▼ ') + fR(Math.abs(st.pnlR)) + ' · ' + fP(st.pct);
}

// ─── PORTFOLIO TAB ───
function renderPf(hs, st) {
  if (!hs.length) return empty('📊','Портфель пуст','Добавьте первую сделку кнопкой ＋');

  const statCards = `<div class="stat-grid">
    <div class="sc"><div class="sc-lbl">Вложено</div><div class="sc-val">${fR(st.costR)}</div></div>
    <div class="sc"><div class="sc-lbl">Сейчас стоит</div><div class="sc-val">${fR(st.valR)}</div></div>
    <div class="sc"><div class="sc-lbl">Прибыль / убыток</div><div class="sc-val ${cls(st.pnlR)}">${st.pnlR>=0?'+':''}${fR(st.pnlR)}</div></div>
    <div class="sc"><div class="sc-lbl">Доходность</div><div class="sc-val ${cls(st.pct)}">${fP(st.pct)}</div></div>
  </div>`;

  // Type allocation bar
  const byType = {crypto:0, stock:0, cash:0};
  hs.forEach(h=>{ if(h.cvu!==null) byType[h.type]=(byType[h.type]||0)+h.cvu; });
  const tot = Object.values(byType).reduce((a,b)=>a+b,0)||1;
  const tColors = {crypto:'var(--crypto)',stock:'var(--stock)',cash:'var(--cash)'};
  const tNames  = {crypto:'Крипта',stock:'Акции/ETF',cash:'Валюта'};
  const bar = Object.entries(byType).filter(([,v])=>v>0)
    .map(([k,v])=>`<div class="alloc-seg" style="width:${(v/tot*100).toFixed(1)}%;background:${tColors[k]}"></div>`).join('');
  const leg = Object.entries(byType).filter(([,v])=>v>0)
    .map(([k,v])=>`<div class="al-item"><div class="al-dot" style="background:${tColors[k]}"></div>${tNames[k]}<span style="color:var(--text3);font-family:var(--mono);font-size:10px">${(v/tot*100).toFixed(1)}%</span></div>`).join('');

  const allocCard = `<div class="card"><div class="card-ttl">По типу активов</div>
    <div class="alloc-bar">${bar}</div><div class="alloc-leg">${leg}</div></div>`;

  const donutCard = `<div class="card"><div class="card-ttl">Структура портфеля</div>
    <div class="chart-wrap"><canvas id="donutC"></canvas></div></div>`;

  const topRows = hs.slice(0,6).map(h=>`
    <div class="asset-row">
      <div class="ai ${h.type}">${h.sym.slice(0,3)}</div>
      <div class="ai-info"><div class="ai-name">${h.name}</div>
        <div class="ai-sub">${fQ(h.qty,h.sym)} · ${fU(h.cup)}</div></div>
      <div class="ai-r"><div class="ai-val">${fR(h.cvR)}</div>
        <div class="ai-pnl ${cls(h.pct)}">${fP(h.pct)}</div></div>
    </div>`).join('');

  const topCard = `<div class="card"><div class="card-ttl">Позиции</div>${topRows}</div>`;

  return statCards + allocCard + donutCard + topCard;
}

// ─── ANALYTICS TAB ───
function renderAna(hs, st) {
  if (!hs.length) return empty('📈','Нет данных','Добавьте сделки для аналитики');
  const sorted = [...hs].filter(h=>h.pct!==null);
  const best   = sorted.length ? [...sorted].sort((a,b)=>b.pct-a.pct)[0] : null;
  const worst  = sorted.length ? [...sorted].sort((a,b)=>a.pct-b.pct)[0] : null;
  const txBuys = S.txs.filter(t=>t.op==='buy').reduce((s,t)=>s+t.qty*t.priceUsd,0)*(S.usdRub||90);

  const metrics = `<div class="ana-grid">
    <div class="mc"><div class="mc-lbl">Лучшая позиция</div>
      <div class="mc-val gain">${best?.sym??'—'}</div>
      <div class="mc-sub">${fP(best?.pct)}</div></div>
    <div class="mc"><div class="mc-lbl">Худшая позиция</div>
      <div class="mc-val loss">${worst?.sym??'—'}</div>
      <div class="mc-sub">${fP(worst?.pct)}</div></div>
    <div class="mc"><div class="mc-lbl">Позиций</div>
      <div class="mc-val acc">${hs.length}</div>
      <div class="mc-sub">${S.txs.length} сделок</div></div>
    <div class="mc"><div class="mc-lbl">Общий ROI</div>
      <div class="mc-val ${cls(st.pct)}">${fP(st.pct)}</div>
      <div class="mc-sub">${st.rub?'1 USD = '+st.rub.toFixed(2)+' ₽':'—'}</div></div>
    <div class="mc"><div class="mc-lbl">Инвестировано</div>
      <div class="mc-val">${fR(st.costR)}</div></div>
    <div class="mc"><div class="mc-lbl">Всего вложено</div>
      <div class="mc-val">${fR(txBuys)}</div>
      <div class="mc-sub">сумма покупок</div></div>
  </div>`;

  const barCard = `<div class="card"><div class="card-ttl">P&L по активам</div>
    <div class="chart-wrap"><canvas id="barC"></canvas></div></div>`;
  const pieCard = `<div class="card"><div class="card-ttl">Доля в портфеле</div>
    <div class="chart-wrap"><canvas id="pieC"></canvas></div></div>`;

  return metrics + barCard + pieCard;
}

function openModal() {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  requestAnimationFrame(()=>ov.classList.add('open'));
  document.getElementById('txDate').value = new Date().toISOString().slice(0,10);
  resetForm();
}
function closeModal() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('open');
  setTimeout(()=>ov.style.display='none', 300);
}
function overlayClick(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

function resetForm() {
  selOp('buy'); selType('crypto');
  ['txQty','txPrice'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('txTotal').textContent='0.00';
  document.getElementById('cryptoSel').value='';
  document.getElementById('stockIn').value='';
  document.getElementById('cashSel').value='';
  S.form.sym=''; S.form.name=''; S.form.geckoId='';
}

function selOp(op) {
  S.form.op = op;
  document.getElementById('btn-buy').className  = 'tb' + (op==='buy' ?' on-buy':'');
  document.getElementById('btn-sell').className = 'tb' + (op==='sell'?' on-sell':'');
}

function selType(type) {
  S.form.type = type;
  ['crypto','stock','cash'].forEach(t=>document.getElementById('btn-'+t).className='tb'+(t===type?' on-'+t:''));
  document.getElementById('cryptoSel').style.display = type==='crypto'?'block':'none';
  document.getElementById('stockIn').style.display   = type==='stock'?'block':'none';
  document.getElementById('cashSel').style.display   = type==='cash'?'block':'none';
  document.getElementById('assetLbl').textContent = type==='crypto'?'Криптовалюта':type==='stock'?'Тикер (Yahoo Finance)':'Валюта';
  document.getElementById('priceLbl').textContent = 'Цена (USD)';
  S.form.sym=''; S.form.name=''; S.form.geckoId='';
  document.getElementById('txPrice').value='';
  calcTotal();
}

function onCryptoPick() {
  const v = document.getElementById('cryptoSel').value;
  const c = CRYPTOS.find(x=>x.id===v);
  if (c) {
    S.form.sym=c.sym; S.form.name=c.name; S.form.geckoId=c.id;
    const p = S.prices[c.sym]?.usd;
    if (p) { document.getElementById('txPrice').value=p.toFixed(p>10?2:6); calcTotal(); }
  }
}

function onStockType() {
  const v = document.getElementById('stockIn').value.trim().toUpperCase();
  S.form.sym=v; S.form.name=v; S.form.geckoId=null;
  const p = S.prices[v]?.usd;
  if (p) { document.getElementById('txPrice').value=p.toFixed(2); calcTotal(); }
}

function onCashPick() {
  const v = document.getElementById('cashSel').value;
  const c = CASHES.find(x=>x.sym===v);
  if (c) {
    S.form.sym=c.sym; S.form.name=c.name; S.form.geckoId=null;
    const p = S.prices[c.sym]?.usd;
    if (p) { document.getElementById('txPrice').value=p.toFixed(4); calcTotal(); }
  }
}

function calcTotal() {
  const q = parseFloat(document.getElementById('txQty').value)||0;
  const p = parseFloat(document.getElementById('txPrice').value)||0;
  document.getElementById('txTotal').textContent = (q*p).toFixed(2);
}

function submitTx(e) {
  e.preventDefault();
  const {op, type, sym, name, geckoId} = S.form;
  if (!sym) { toast('Выберите актив ⚠️'); return; }
  const qty   = parseFloat(document.getElementById('txQty').value);
  const price = parseFloat(document.getElementById('txPrice').value);
  const date  = document.getElementById('txDate').value;
  if (!qty||qty<=0)   { toast('Введите количество ⚠️'); return; }
  if (!price||price<=0){ toast('Введите цену ⚠️'); return; }
  if (!date)           { toast('Выберите дату ⚠️'); return; }

  const tx = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2),
    op, type, sym, name, geckoId, qty, priceUsd: price, date
  };
  S.txs.push(tx);
  saveTx();

  // Cache price if not present
  if (!S.prices[sym]) S.prices[sym]={usd:price, ch24:0, ts:0};

  closeModal();
  render();
  toast('Сделка добавлена ✓');

  // Fetch fresh prices for newly added asset
  setTimeout(doRefresh, 300);
}

function delTx(id) {
  if (!confirm('Удалить эту сделку?')) return;
  S.txs = S.txs.filter(t=>t.id!==id);
  saveTx();
  render();
  toast('Сделка удалена');
}

// ════════════════════════════════════════════
//  EXPORT
// ════════════════════════════════════════════
function doExport() {
  if (!S.txs.length) { toast('Нет данных для экспорта'); return; }
  const sorted = [...S.txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const hdr  = 'Дата,Операция,Тип,Символ,Название,Количество,Цена USD,Сумма USD,Сумма RUB\n';
  const rows = sorted.map(t=>{
    const sumU = t.qty*t.priceUsd;
    const sumR = sumU*(S.usdRub||90);
    return `${t.date},${t.op==='buy'?'Купля':'Продажа'},${t.type},${t.sym},${t.name},${t.qty},${t.priceUsd},${sumU.toFixed(2)},${sumR.toFixed(0)}`;
  }).join('\n');
  const blob = new Blob(['\ufeff'+hdr+rows], {type:'text/csv;charset=utf-8;'});
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`ptx_${new Date().toISOString().slice(0,10)}.csv`});
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV экспортирован ✓');
}

//  TOAST
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove('show'), 2400);
}

//  INIT
function initSelects() {
  const cs = document.getElementById('cryptoSel');
  cs.innerHTML = '<option value="">— выберите —</option>' + CRYPTOS.map(c=>`<option value="${c.id}">${c.name} (${c.sym})</option>`).join('');
  const ch = document.getElementById('cashSel');
  ch.innerHTML = '<option value="">— выберите —</option>' + CASHES.map(c=>`<option value="${c.sym}">${c.name} (${c.sym})</option>`).join('');
}

async function init() {
  load();
  initSelects();
  render();
  setStatus('','—');

  // If we have transactions and prices are stale (>5 min) — refresh
  const lastTs = Math.max(...Object.values(S.prices).map(p=>p.ts||0), 0);
  if (S.txs.length && Date.now()-lastTs > 5*60*1000) {
    await doRefresh();
  } else if (S.txs.length) {
    setStatus('live','Актуально');
  } else {
    setStatus('','Добавьте первую сделку');
  }
}

init();
</script>
